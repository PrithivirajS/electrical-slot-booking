<!DOCTYPE html>
<html>
<head>
    <title>Technicians</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
</head>

<body>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>⚡ E-service</h2>
        <ul>
            <li><a href="/dashboard">Dashboard</a></li>
            <li><a href="/users">Users</a></li>
            <li class="active">Technicians</li>
            <li><a href="/technician/bookings">My Jobs</a></li>
        </ul>
    </div>

    <!-- Main -->
    <div class="main">

        <!-- Header -->
        <div style="display:flex; justify-content:space-between;">
            <h2>Technician Management</h2>
            <button onclick="openModal()" class="add-btn">+ Add Technician</button>
        </div>

        <!-- Table -->
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Phone</th>
                        <th>Education</th>
                        <th>Status</th>
                        <th>Active</th>
                        <th>Actions</th>
                    </tr>
                </thead>

                <tbody>
                {% for t in technicians %}
                <tr>
                    <td>{{ t[0] }}</td>
                    <td>{{ t[1] or '-' }}</td>
                    <td>{{ t[2] or '-' }}</td>
                    <td>{{ t[10] or '-' }}</td>
                    <td>{{ t[16] }}</td>

                    <!-- Active Toggle -->
                    <td>
                        <button onclick="toggleTech({{ t[0] }})">
                            {{ 'Active' if t[17] == 1 else 'Inactive' }}
                        </button>
                    </td>

                    <!-- Actions -->
                    <td>
                        <button onclick="viewTech({{ t[0] }})">👁️</button>
                        <button onclick="editTech({{ t[0] }})" class="edit-btn">✏️</button>
                        <button onclick="deleteTech({{ t[0] }})" class="delete-btn">🗑️</button>
                    </td>
                </tr>
                {% endfor %}
                </tbody>
            </table>
        </div>

        <!-- Modal -->
        <div id="techModal" class="modal">
            <div class="modal-content">

                <form id="techForm" enctype="multipart/form-data">

                <div class="modal-body">

                    <h3>Add / Edit Technician</h3>

                    <input type="hidden" name="id" id="tech_id">

                    <input type="text" name="name" placeholder="Name">
                    <input type="text" name="guardian" placeholder="Guardian">

                    <input type="text" name="phone1" placeholder="Phone 1">
                    <input type="text" name="phone2" placeholder="Phone 2">

                    <input type="text" name="flat" placeholder="Flat / Door No">
                    <input type="text" name="street" placeholder="Street">
                    <input type="text" name="post" placeholder="Post">
                    <input type="text" name="taluk" placeholder="Taluk">
                    <input type="text" name="district" placeholder="District">
                    <input type="text" name="pincode" placeholder="Pincode">

                    <input type="text" name="education" placeholder="Education">

                    <select name="govtType">
                        <option>Aadhaar</option>
                        <option>PAN</option>
                        <option>Voter ID</option>
                    </select>

                    <input type="text" name="govtNumber" placeholder="ID Number">

                    <label>Resume (PDF)</label>
                    <input type="file" name="resume">

                    <label>Photo</label>
                    <input type="file" name="photo">

                </div>

                <div class="modal-footer">
                    <button type="button" onclick="saveTechnician()" class="save-btn">Save</button>
                    <button type="button" onclick="closeModal()" class="cancel-btn">Cancel</button>
                </div>

                </form>

            </div>
        </div>

        <!-- Success Popup -->
        <div id="successPopup" class="modal">
            <div class="success-box">
                <div class="success-icon">✔</div>
                <h3>Success!</h3>
                <button onclick="closeSuccessPopup()" class="confirm-btn">OK</button>
            </div>
        </div>

    </div>
</div>

<script>

// MODAL
function openModal() {
    document.getElementById("techModal").style.display = "block";
}

function closeModal() {
    document.getElementById("techModal").style.display = "none";
}

// ADD / UPDATE
function saveTechnician() {

    let form = document.getElementById("techForm");
    let formData = new FormData(form);

    let id = document.getElementById("tech_id").value;
    let url = id ? "/update-technician" : "/add_technician";

    fetch(url, {
        method: "POST",
        body: formData
    })
    .then(res => res.json())
    .then(data => {

        if (data.status === "success" || data.status === "updated") {
            closeModal();
            document.getElementById("successPopup").style.display = "block";
        } else {
            alert(data.error);
        }
    });
}

// EDIT
function editTech(id) {
    fetch(`/get-technician/${id}`)
    .then(res => res.json())
    .then(data => {

        openModal();

        document.getElementById("tech_id").value = data.id;
        document.querySelector('[name="name"]').value = data.name;
        document.querySelector('[name="phone1"]').value = data.phone1;
        document.querySelector('[name="street"]').value = data.street;
    });
}

// DELETE
function deleteTech(id) {

    if (!confirm("Delete this technician?")) return;

    fetch("/delete-technician", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({id: id})
    })
    .then(() => location.reload());
}

// TOGGLE ACTIVE
function toggleTech(id) {

    fetch("/toggle-technician", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({id: id})
    })
    .then(() => location.reload());
}

// VIEW
function viewTech(id) {

    fetch(`/get-technician/${id}`)
    .then(res => res.json())
    .then(data => {

        alert(`
Name: ${data.name}
Phone: ${data.phone1}
Street: ${data.street}
        `);
    });
}

// SUCCESS
function closeSuccessPopup() {
    document.getElementById("successPopup").style.display = "none";
    location.reload();
}

</script>

</body>
</html>
