{% extends "base.html" %}
{% block content %}

<link rel="stylesheet" href="{{ url_for('static', filename='booking.css') }}">

<div class="booking-wrapper">

    <!-- LEFT -->
    <div class="left">

        <div class="service-box">
            <h3>Electrical Service ⚡</h3>
            <p>Professional electrical service at your location</p>
            <p><b>₹500 • 30 minutes</b></p>
        </div>

        <!-- DATES -->
        <div class="dates">
            {% for d in days %}
                <button class="date-btn" onclick="loadSlots('{{d}}', this)">
                    {{d}}
                </button>
            {% endfor %}
        </div>

        <!-- SLOT CONTAINER -->
        <div id="slotsContainer"></div>

    </div>

    <!-- RIGHT -->
    <div class="right">

        <h3>Service Details</h3>

        <p><b>Name:</b> {{user[0]}}</p>
        <p><b>Email:</b> {{user[1]}}</p>
        <p><b>Phone:</b> {{user[2]}}</p>

        <hr>

        <p><b>Selected Slot:</b> <span id="selectedSlot">None</span></p>
        <p><b>Time Left:</b> <span id="timer">--</span></p>

        <form method="POST" action="/book" onsubmit="return submitForm(this)">

            <input type="hidden" name="slot_id" id="slot_id">
            <input type="hidden" name="booking_date" id="booking_date">
            <input type="hidden" name="latitude">
            <input type="hidden" name="longitude">

            <textarea name="remarks" placeholder="Enter remarks"></textarea>

            <button class="btn">Confirm Booking</button>

        </form>

    </div>

</div>

<script src="{{ url_for('static', filename='booking.js') }}"></script>

{% endblock %}
