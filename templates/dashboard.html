{% extends "base.html" %}

{% block title %}Admin Dashboard{% endblock %}

{% block content %}

<!-- Topbar -->
<div class="topbar">
    <div class="profile-container">
        <div class="profile-circle" id="profileBtn">
            <span id="initial"></span>
        </div>
    </div>
</div>

<h2>Today's Schedule</h2>

<div class="cards">

    <div class="card">
        <h3>Total Today</h3>
        <p id="total">0</p>
    </div>

    <div class="card">
        <h3>Booking Confirmed</h3>
        <p id="confirmed">0</p>
    </div>

    <div class="card">
        <h3>Pending</h3>
        <p id="pending">0</p>
    </div>

    <div class="card">
        <h3>Completed</h3>
        <p id="completed">0</p>
    </div>

</div>

<!-- Booking List -->
<div id="bookingList" class="bookings"></div>

<script src="{{ url_for('static', filename='dashboard.js') }}"></script>

{% endblock %}
